name: Release Package

# This action will start when a correctly formatted tag is pushed (e.g. 0.1.0)

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:

jobs:
  build:

    runs-on: windows-latest

    steps:

    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Restore dependencies
      run: dotnet restore OC.UFMMemberLookup.csproj

    - name: Build
      run: dotnet build OC.UFMMemberLookup.csproj -c Release --no-restore /p:Version=${{github.ref_name}}

    - name: Pack
      run: dotnet pack OC.UFMMemberLookup.csproj -c Release --no-build /p:Version=${{github.ref_name}}

    - name: Push to NuGet
      run: dotnet nuget push **\*.nupkg -k ${{secrets.NUGET_API_KEY}} -s https://api.nuget.org/v3/index.json
